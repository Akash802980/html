<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Validator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; display: flex; align-items: center; height: 100vh; }
        .otp-container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; text-align: center; }
        .otp-input { width: 50px; height: 50px; text-align: center; font-size: 1.5rem; margin: 5px; border: 1px solid #ced4da; border-radius: 5px; }
    </style>
</head>
<body>

<div class="otp-container shadow">
    <h4>Verification Code</h4>
    <p class="text-muted">Enter the 4-digit code generated below</p>
    
    <button class="btn btn-dark mb-4" onclick="generateOTP()">Generate OTP</button>
    <div id="displayOTP" class="fw-bold mb-3 text-primary" style="font-size: 1.2rem; letter-spacing: 5px;">----</div>

    <div class="d-flex justify-content-center mb-4">
        <input type="text" class="otp-input" maxlength="1" id="digit1">
        <input type="text" class="otp-input" maxlength="1" id="digit2">
        <input type="text" class="otp-input" maxlength="1" id="digit3">
        <input type="text" class="otp-input" maxlength="1" id="digit4">
    </div>

    <button class="btn btn-success w-100" onclick="validateOTP()">Verify</button>
</div>

<script>
    let generatedOTP = "";

    function generateOTP() {
        // Generates a random 4 digit number
        generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('displayOTP').innerText = generatedOTP;
        
        // Clear previous inputs
        for(let i=1; i<=4; i++) {
            document.getElementById('digit' + i).value = "";
        }
    }

    function validateOTP() {
        const u1 = document.getElementById('digit1').value;
        const u2 = document.getElementById('digit2').value;
        const u3 = document.getElementById('digit3').value;
        const u4 = document.getElementById('digit4').value;

        const userEntered = u1 + u2 + u3 + u4;

        if (generatedOTP === "") {
            alert("Please generate an OTP first.");
        } else if (userEntered === generatedOTP) {
            alert("✅ Success! OTP is valid.");
        } else {
            alert("❌ Invalid OTP. Try again.");
        }
    }

    // Auto-focus move for better UX
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });
    });
</script>

</body>
</html>
